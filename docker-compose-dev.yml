  #     - user-search-dev-net

  # spark-worker:
  #   image: apache/spark:4.1.1
  #   container_name: spark-worker-dev
  #   command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
  #   environment:
  #     - SPARK_WORKER_MEMORY=1G
  #     - SPARK_WORKER_CORES=2
  #   depends_on:
  #     - spark-master
  #   networks:
  #     - user-search-dev-net

networks:
  user-search-dev-net:
    driver: bridge

volumes:
  postgres_data_dev:
  opensearch_data_dev:
  redis_data_dev:
  rabbitmq_data_dev:
  minio_data_dev:
