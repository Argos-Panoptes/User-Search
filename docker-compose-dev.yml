services:
  # Local Development - Backing Services Only

  db:
    image: postgres:18-alpine
    container_name: db-dev
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=user_search
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - user-search-dev-net

  opensearch:
    image: opensearchproject/opensearch:3
    container_name: opensearch-dev
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data_dev:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - user-search-dev-net

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3
    container_name: dashboards-dev
    ports:
      - "5601:5601"
    environment:
      - 'OPENSEARCH_HOSTS=["http://opensearch:9200"]'
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      - opensearch
    networks:
      - user-search-dev-net

  redis:
    image: redis:8-alpine
    container_name: redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - user-search-dev-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-dev
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data_dev:/var/lib/rabbitmq
    networks:
      - user-search-dev-net
  minio:
    image: minio/minio:latest
    container_name: minio-dev
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data_dev:/data
    networks:
      - user-search-dev-net

  # spark-master:
  #   image: apache/spark:4.1.1
  #   container_name: spark-master-dev
  #   command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
  #   environment:
  #     - SPARK_WORKER_MEMORY=1G
  #   ports:
  #     - "8080:8080"
  #     - "7077:7077"
