events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Basic optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    # Large file uploads
    client_max_body_size 100G;
    client_body_buffer_size 512k;
    client_body_timeout 90000s;
    client_header_timeout 90000s;
    
    # Timeouts
    send_timeout 90000s;
    keepalive_timeout 90000s;
    
    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # Docker DNS resolver
    resolver 127.0.0.11 valid=30s;

    # Backend upstream
    upstream backend_upstream {
        server backend:8000 max_fails=0;
    }

    # Auth upstream
    upstream auth_upstream {
        server auth:9000 max_fails=0;
    }

    server {
        listen 80;

        # Large file uploads settings repeated for server block
        client_max_body_size 100G;
        client_body_buffer_size 512k;
        client_body_timeout 90000s;
        client_header_timeout 90000s;

        # Retry on 502/504
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        
        # CSP to allow unsafe-eval and unsafe-inline (needed for Vite/React and various third-party scripts)
        add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://*.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://*.stripe.com; connect-src 'self' https://app.signal-users.com https://*.stripe.com;";
        
        # Redirect root to /app
        location = / {
            return 301 /app/;
        }

        # Serve frontend static files from /app
        location /app/ {
            alias /usr/share/nginx/html/app/;
            index index.html index.htm;
            try_files $uri $uri/ /app/index.html;
        }
        
        # Proxy /api requests to backend (now under /app/api)
        location /app/api {
            # Disable buffering for long-running stream responses if any
            proxy_request_buffering off;
            proxy_buffering off;
            
            # HTTP/1.1
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 90000s;
            proxy_send_timeout 90000s;
            proxy_read_timeout 90000s;

            # Proxy pass using variables to force DNS re-resolution
            set $backend_endpoint http://backend:8000;
            proxy_pass $backend_endpoint;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy auth requests
        location /api/auth {
            set $auth_endpoint http://auth:9000;
            proxy_pass $auth_endpoint;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        
        location /app/flower/ {
            # allow 127.0.0.1;
            # allow 172.16.0.0/12;

            # deny all;
            allow all;

            proxy_pass http://flower:5555/app/flower/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
